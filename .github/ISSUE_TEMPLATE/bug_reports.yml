name: Bug Report
description: |
  File a bug report. Please read the whole bug report form before you start filling it out.
title: "[Bug]: "
labels: ["bug"]
assignees:
  - akarealemil
  - perpetualpossum  

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        Please read the whole bug report form before you start filling it out.
  - type: dropdown
    id: python-version
    attributes:
      label: Python Version
      description: Which version of Python are you using?
      options:
        - "3.10"
        - "3.11"
        - "3.12"
        - "3.13"
        - "3.14"
        - "3.15"
        - "3.16"
      default: 3
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: Explain the bug, as clearly as you can.
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
      value: "A bug happened! :("
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant log output. This will be automatically formatted into code, so no need for backticks.
      render: shell
  - type: checkboxes
    id: duplicates-check
    attributes:
      label: No Duplicates
      description: By submitting this issue, you acknowledge that you have searched for existing issues and believe this is not a duplicate of an existing issue.
      options:
        - label: I believe this is not a duplicate issue.
          required: true